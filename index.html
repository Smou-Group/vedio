<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMOU GROUP | Video</title>

<style>
body{
    margin:0;
    font-family:Tajawal, sans-serif;
    background:#0a0f17;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    color:#fff;
}

/* إطار زجاجي واضح */
.video-frame{
    width:380px;
    aspect-ratio:9/16;
    border-radius:28px;
    overflow:hidden;
    border:2px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(14px);
    box-shadow:0 25px 60px rgba(0,0,0,.45);
    position:relative;
    cursor:pointer;
    transition:.3s;
}
.video-frame:hover{
    transform:scale(1.02);
}

/* صورة الغلاف */
.video-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* زر تشغيل في المنتصف */
.play-btn{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
}

.play-circle{
    width:80px;
    height:80px;
    border-radius:50%;
    background:rgba(0,0,0,.6);
    border:2px solid rgba(255,255,255,.6);
    display:flex;
    align-items:center;
    justify-content:center;
}

.play-circle:after{
    content:"";
    border-left:22px solid #fff;
    border-top:14px solid transparent;
    border-bottom:14px solid transparent;
    margin-left:6px;
}

/* iframe بعد التشغيل */
.video-frame iframe{
    width:100%;
    height:100%;
    border:0;
}
</style>
</head>

<body>

<div class="video-frame" onclick="playVideo()" id="videoBox">
    
    <!-- صورة غلاف تلقائية من يوتيوب -->
    <img src="https://img.youtube.com/vi/Cow1xpKGi6M/maxresdefault.jpg">

    <div class="play-btn">
        <div class="play-circle"></div>
    </div>

</div>

<script>
function playVideo(){
    document.getElementById("videoBox").innerHTML = `
        <iframe 
        src="https://www.youtube.com/embed/Cow1xpKGi6M?autoplay=1&rel=0&modestbranding=1"
        allow="autoplay; encrypted-media"
        allowfullscreen>
        </iframe>
    `;
}
</script>

</body>
</html>
